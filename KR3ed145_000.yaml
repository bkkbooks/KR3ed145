body:
  text: 內科健脾丸編者按據劉雪崖仙儒外記載平定竇學周高士也傅青主數寓其家嘗為制健脾丸特神效後太原衛生館取去太原衛生館出售健脾丸聞名晉中療效卓著解放後衛生館老主人去世後後代改業參加其他工作本方系衛生館老主人傳授給山西省中醫研究所白清佐老大夫臨床運用多年實踐證明特效現據白清佐老大夫轉傳介紹如下小米鍋巴烘乾二兩面鍋巴烘乾二兩長山藥烘乾二兩黨參八錢白朮炒八錢蓮子去蕊炒八錢薏苡仁炒八錢穀芽炒八錢麥芽炒八錢焦山楂八錢草豆蔻八錢共為細末煉蜜為丸每服三錢方解本方為健脾除濕消食去積之劑主治脾胃素虛不思飲食食物難消精神萎靡面黃消瘦脾虛泄瀉等症本方旨在健脾消積補而不膩消而不峻補中有消寓消於補藥性和平王道處方立法謹嚴故長久服之有利無弊方中以米鍋巴面鍋巴長山藥為君皆為日常食品有健脾之功白朮蓮子薏苡仁均為健脾除濕之妙品據炮製原則變甘淡為焦香取中焦苦化化陽有燥濕培土之能香入脾土俱沁脾磨運之功也穀芽消米麥芽消面山楂消肉食之積更有黨參補中益氣豆蔻溫脾健運故食積脾困或脾胃素虛者得服此劑自無不愈也脾腎兩助丸編者按原太原市大寧堂藥店自崇禎末年開設大寧堂的創始人和傅青主關係密切本方為傅青主傳授祕方之一功能健脾暖腎主治身體虛弱羸弱自汗夢遺滑精不思飲食銷售多年著稱於世或謂本方系舊有成方非傅青主所創經查對驗方中有脾腎雙補丸嵩崖尊生書方中有脾腎丸而其用藥均與脾腎兩助丸不同現據大寧堂配本將脾腎兩助丸用藥分量及製法介紹如下黨參去蘆十六兩四錢白朮土炒四兩四錢雞內金土炒四兩五錢土元去足四兩五錢川芎二兩七錢山藥土炒十八兩黃耆土炒十八兩白芍土炒十八兩小茴香淡鹽水炒十八兩熟地三十四兩山萸肉蒸十八兩茯苓九兩黑杜仲四兩六錢枸杞四兩六錢破故紙淡鹽水炒四兩六錢鎖陽四兩六錢菖蒲四兩六錢鬱金四兩六錢陳皮四兩六錢製半夏四兩六錢冬花四兩六錢麥冬去心四兩六錢川貝母去心四兩六錢二醜子土炒四兩六錢牛膝四兩六錢蓯蓉四兩六錢炙甘草四兩六錢君子仁二兩七錢澤瀉一兩八錢當歸土炒二兩七錢以上三十味共計二百五十七兩九錢研為細粉煉蜜為丸梧桐子大每服三錢日服二次淡鹽水送下飯後服方解脾胃者入納腐熟後天之本也腎者生化之源先天之本也苟脾腎功能一失正常則百病叢生矣本方功能培土建中壯水益火故主脾腎兩虛之證蓋脾與胃為表裡脾旺則胃宏其納受之能腎與膀胱為表裡腎強則州都彰氣化則出也且脾旺則散精於肺以生金金旺則水得長生而益腎土旺則能制水水暢其流則化氣而無寒中之變此概言其補益脾腎之理也至若脾腎兩虛之症如不思飲食食而不化腹脹腸鳴大便溏瀉四肢清冷面黃消瘦或遺精精冷腰膝痠軟下肢寒冷肢體浮腫及五更瀉泄等症並皆治之本方乃六君子湯六味地黃湯四物湯合力之加減也方中黃耆君子仁雞內金炒二醜小茴香助六君補氣和胃健脾枸杞當歸白芍佐六味以滋肝腎之陰杜仲故紙蓯蓉鎖陽溫補腎陽復用菖蒲鬱金開心舒氣以解鬱牛膝土元人血以行滯貝母冬花麥冬滋肺陰而清金雖名脾腎兩助實則母子互因五臟兼補氣血兼顧之劑而其主旨則仍在於脾腎也夫治病應求其本脾腎乃生化之根功能增強生活力抵抗力亦必增強自能抵禦外邪祛除百損本方補陰而不膩滯助陽而不辛烈故常服久服而無弊端也和合二仙丸編者按太原市大寧堂出售之和合丸和二仙丸郝樹侯太原史話謂為太原特效藥之一系傅青主所傳授主治産婦和男子中風中寒腰腿疼痛手足麻木或痿軟不能起床等症現據大寧堂配本將和合丸及二仙丸用藥分量及製法介紹如和合丸黑木耳六十兩蒼朮十兩生川烏二兩生草烏三兩生沒藥二兩五錢生乳香二兩五錢杜仲炭二兩牛膝二兩以上八味共計八十四兩共研細粉水泛為丸每次服二錢日服二次白水送下婦女先服二仙丸十二兩一月後再服和合丸至病愈為止男用只服和合丸忌白酒蔥蒜椒韭辛辣孕婦忌服二仙丸黑木耳六十兩蒼朮米泔水制十兩生川烏二兩生草烏二兩杜仲炭二兩牛膝二兩升麻二兩神麯二兩以上八味共計八十二兩製法功能主治用法用量同和合丸方解和合丸和二仙丸均為和血搜風除濕祛寒之劑專治婦女産後及男子中風中寒腰腿疼痛手足麻木拘攣痿躄行步困難或左癱右瘓不能下床等症按本草黑木耳甘平有小毒善於理血主婦人月水不調崩中帶下癥瘕積聚並主男女衄血瀉血痔漏腸風等症且能宣腸胃和五臟排毒氣益氣血古人云風寒濕三氣雜至合而為痹也又云治風先治血血行風自滅本方重用木耳取理血治風之意也川烏草烏大辛大熱搜風散寒攻堅積祛寒痰舒利關節然其性峻烈用之過量常常引起嘔吐抽麻等反應故配以大量木耳緩其急暴之性蒼朮益氣除濕則風寒濕痹自無不愈之理引用杜仲炭牛膝使藥力下達腰腎及下肢故能治腰腿風寒濕痹氣虛作麻血瘀作木等症也和合丸中加乳香沒藥意在增強其活血行瘀舒筋止痛之效然婦女新産之後或平日血虧體虛氣血大虛不宜驟用乳香沒藥故二仙丸中去乳香沒藥而加升麻神麯意在升發脾胃使脾胃健運氣血充足然後改服和合丸也方中川烏草烏大辛大熱而有毒乳香沒藥活血行瘀之力較迅均不宜於孕婦故孕婦忌服使用者尤當提起注意消利濕氣腫脹祕方編者按本方系山西省文物管理委員會所藏的傅青主遺墨寶迹中傅青主手書的祕方原名為消利濕氣腫脹神效祕要方經山西省中醫研究所商得省文管會同意曾在該所內部資料中醫研究通訊年第期發表人參去蘆熟附子制到厚朴去皮生薑制到鱉甲用奶酥油即酥牛乳炙到各一錢好甜真桂心用捲筒雄雞矢白焙研各二錢陳皮海藻洗去鹹鹽水各五分莫茱萸生薑浸干大蝦蟆一個用酥油炙黃了去頭足腸垢空心水煎熱服不過三五劑即愈平安方解本方為傅青主先生治濕氣腫脹之經驗神效方寒熱並用攻補兼施不偏不倚具協調之妙實王道之劑也故對濕氣腫脹之疾示以平安二字宜放膽用之不必多用顧忌也至於對中醫所謂氣臌是否有效尚有待臨床上之證明方中以蝦蟆為君性味辛寒除邪破症善治堅血癰腫更能利水氣消通身腫脹驗方新編臌脹浮腫條下收載之驗方中用蝦蟆者凡四見鱉甲入肝脾滋陰血而消痞症亦為治臌脹之妙品二味俱用酥炙者則更具妙意本草述鉤元論酥曰味甘氣微寒補五臟益虛勞利大小腸能除腹內陳垢又追毒氣發出毛孔間雞矢白性寒通利二便善治心腹臌脹莫茱萸厚朴溫通脾氣以消脹滿然水濕之排出除皮毛外必賴膀胱和腎之作用故用桂心化膀胱之氣附子啓命門之火更加人參葆和胃氣坐鎮中宮陳皮行氣海藻行水軟堅以為引水濕自能排出濕氣腫脹無不消失矣口眼歪斜中風痰症祕方編者按本方系傅青主所遺而由傅氏家藏存晉祠文物保管所原名為傅氏家藏祕方專治口眼歪斜中風痰症乾山藥四錢半夏薑製四錢細辛根遼東一錢膽南星一錢加生薑去皮五片水二鍾黃酒二鍾泡到煎極滾服外治神效方生半夏生南星等分為末以小米湯沫調勻左歪搽右右歪塗左方解本方為治脾濕痰阻陽明之經急致口眼歪斜之妙方也方中半夏和胃氣燥脾濕消痰滿開痰結山藥益氣補脾脾健濕痰自化膽星除痰清熱細辛潤腎消飲又得生薑宣通脾胃和解表裡更有黃酒通行血脈榮養肌膚則濕痰自無留止之地矣脾濕生痰致陽明之經急而口眼喎斜者得此扶土燥濕祛痰通竅自可全愈矣半夏南星為末外敷有消陰結散血滯消腫止痛之效故用治口眼歪斜之中風症為妙也按此二味外貼皮膚每起紅疹不必疑懼繼續貼用決無害也噎膈反胃方編者按本方系蘇州市文物管理委員會所藏之傅青主手書藥方原無方名及主治照片曾刊中醫研究通訊年第期現據照片録如下熟半夏四兩大白蘿蔔一個打碎共煮成糊人參二兩薑黃一兩射干酒炒一兩共細末用石腦油一半牛沫涎一半為丸梧子大真好硃砂衣了空心晚飯後生薑湯下七八十丸方解按金匱大半夏湯治噎膈反胃吐食方用人參半夏長流水入蜜揚二百四十遍煎服陳修園解本方曰張石頑云膈咽之間交通之氣不得降者皆衝脈上行逆氣所作也衝脈不治取之陽明仲景以半夏降衝脈之逆即以白蜜潤陽明之燥加人參以生既亡之津液用甘瀾水以降逆上之水液古聖之經方唯仲景知之本方亦用半夏為君以降衝脈之逆以石腦油代白蜜潤陽明之燥加入參以生既亡之津液先生更以射干薑黃白蘿蔔助半夏之力以降濁陰射於更能利咽喉以消胃脘之癰以其能消瘀血也尤妙加牛涎考諸本草牛口涎治反胃嘔吐水服二匙終身不噎亦助人參以生既亡之胃津也然先生未講方義此解未知符合先生之原意否附牛口涎取法取鹽面一把抹在牛舌上口涎即下以器盛之或就牛回嚼時急取其口中之草以新汲水漬之去草渣用汁亦得婦科臨産産後神效經驗方編者按此兩方系北京太醫院劉氏世德堂刻傳傅青主臨床證明之經驗方存傅青主遺墨寶迹內山西省文管會藏曾刊於中醫研究通訊年第期臨産經驗要方川芎熟地黃各三錢益母草三錢當歸身酒浸透五錢元胡索醋製香附米醋炒各一錢枳殼麩子炒八分生甘草三分共八味水泡三大茶鍾煎一鍾加黃酒少許調勻溫服渣再服效方解臨産要方者産時備急之劑防難産也若平素易産者則無需服藥順其自然時至自下若難産者可用以催生然世傳催生之方藥味滑利峻猛難期至善臨産常用之劑公推佛手散當歸川芎為最良此方即在佛手散基礎上加氣分藥蓋取以氣帥血氣行血隨之意則無難産之患也方中用川芎熟地益母草尤重用歸身為君意在行氣活血氣行血旺猶河中水漲舟行自利矣然恐歸身熟地補血滋膩故方中又加元胡香附枳殼諸行氣之品而輕其分量又引用黃酒以行藥力取其輕靈活潑運胎順産之意也臨盆將産之時得此潤澤流利之品達生自順也産後極效要方川芎益母草各三錢熟地黃二錢玄胡索香附米俱用醋炒各一錢當歸全五錢枳殼麩炒八分生甘草三分生楂肉一錢五分澤蘭葉八分共十味水泡三大茶鍾煎一鍾亦加上黃酒少許調勻溫服渣再服用好糯酒效而有力此二方已經驗效最妙平穩方解本方乃前臨産要方中加山楂肉澤蘭葉也産後氣血大虛理宜用補但恐惡露未盡峻補須防壅滯故於補血中而兼行瘀則本標兼顧統治道之全矣産後少服本方一二劑有去瘀生新之功可防瘀血為患自無瘀血攻痛瘀血暈厥惡露不行血塊作痛之患矣若産後腹痛暈厥狂亂因瘀而致者亦可使用本方方中調氣行瘀之品雖多但分量極輕誠補中有瀉威而不猛之劑也故曰最妙平穩方中用川芎當歸益母草善生新血而行瘀滯山楂肉澤蘭元胡香附枳殼理氣和血則去瘀生新之力更強又有熟地補血甘草和中引加黃酒以行藥力故為産後調理之良方也血暈止述散編者按本方為大寧堂出售之成藥主治産婦分娩後余血上衝兩眼昏暗耳鳴身熱不省人事系傅青主所傳祕方之一聲譽素著家喻戶曉郝樹侯太原史話謂為太原市特效藥之一現據大寧堂配本介紹如下紅娘二兩當歸五錢白芷五錢川芎五錢乳香五錢沒藥五錢共研細面清茶送下每服三錢方解本方行瘀血通氣閉上行頭面清神明故為産後余血上衝敗血搶心目暗耳鳴暈厥眩昏不省人事之特效妙方也本方雖為破血氣行瘀滯之劑然産後瘀血不盡則百病叢生也且用量較輕每服三錢乃穩妥平安之劑經云有故無隕亦無隕也有則受之用得其宜正合經旨何可疑乎方中以紅娘又名樗雞為君通血閉行瘀血乳香沒藥行氣帥血當歸川芎去瘀生新最妙在於白芷蓋白芷專入陽明陽明乃多氣多血之經其脈營於面凡血暈者皆血苑於上逆於陽明之經故用白芷單刀直入且引諸藥上達頭面以祛在上之瘀滯暈厥自愈神識自清矣飲藥以清茶者以其能清心寧神也癸日丸和烏雞丸編者按本方為傅青主傳世的婦科成藥藥名雖不相同而所用藥品和主治則無差異行銷三百年著稱於世原大濮府五福堂所售者名烏雞丸原城隍廟街郭姓所售者名癸日丸川大黃一兩五錢當歸三兩紅花三兩以上三味俱用陳醋浸透巴豆三兩去油共為細末煉蜜為丸梧桐子大每服三錢白開水送下方解本方為治産後瘀血腹痛不思飲食及産後惡血不行所致之各種疾患為迅速攻下之劑祛瘀蕩實之功頗強故於臨床上使用必須審其確為瘀血積聚者方可用之如非瘀血而屬虛寒之腹痛不但無效反而有害不可不慎也婦女産後惡露不行瘀血留止最易導致心腹攻痛血暈發狂等症方中大黃入手足陽明蕩滌多氣多血之腑攻瘀行滯收釜底抽薪之效紅花當歸均為活血行瘀之品三味俱用醋浸則別具妙意蓋醋入肝走血和胃理氣主消癰腫諸毒除症塊堅積散結氣及心腹中酸水痰飲治婦人心痛血氣併産後血暈又得巴豆迅利者導氣消積使惡血積滯一鼓而下取速戰速決之意非緩和之用也一戰之後積瘀得下滯痞得行脾胃調和氣血流暢自無疾苦矣乳癰驗方編者按本方為傅青主驗方之一流傳於西村一帶白清佐老大夫在臨床上屢用屢效中醫研究通訊年第期曾介紹其用本方治療乳癰經驗傅青主所謂諸瘡內托尤愚所長本方即其驗證之一金銀花八兩燒酒八兩水煎服輕者二付愈重者三四付愈方解金銀花味甘氣微寒主寒熱身腫解散熱毒為外科瘡腫之要藥以其味甘而氣微寒不傷胃氣故大量用之而無流弊也燒酒性善走通行經絡宣通血脈行藥力開鬱結其性大熱似與瘡腫不宜然經煎熬之後辛烈之氣已失大半借其上騰之性浮載藥力使達上焦故治乳癰尤宜也白帶驗方編者按本方系西村一帶流傳之傅青主驗方山西省中醫研究所白清佐老大夫運用於臨床療效卓著和平穩妥簡便易行誠良方也雞蛋個蕎麥麵四兩將雞蛋打入面內在火上炒為老黃色不要炒焦然後研成細面早晚各服四錢若白帶而兼腹痛腹脹者用小茴香熬水為引腹不痛不脹者以鹽水為引輕者一料即愈重者三料全愈方解語云十女九帶言其發病之多也本方藥品簡單易制易得尤其在廣大農村最宜推行且藥性和平不寒不熱有補正祛邪之功無偏倚峻厲之弊平淡中而顯神奇之方也本草述鉤元云蕎麥味甘酸平氣微寒降氣寬腸煉五臟滓穢磨積滯療白濁白帶脾積泄瀉又論雞卵曰卵白像大其氣清其性微寒卵黃像地其氣渾其性溫故白能清氣治伏熱黃能補血全卵則合而有之蕎麥治帶雞蛋補虛然二味均有寒性與脾虛帶脈失約之白帶證不宜故二味同炒殺其寒性既有健脾補虛之功又有除濕止帶之效也按服藥期間忌食生甘草大棗服之令人脹滿外科頭上浸淫瘡膏編者按本方為徐維瞻傳傅氏家藏祕方之一存晉祠文物保管所原名為頭上浸淫一切瘡效膏香油一兩黃蠟三錢官粉三錢白蘞一錢銅緑三分頭髮一大摶五倍子先熬血餘然後入蠟化之再和諸藥為膏外敷用加大黃乳香雄黃更妙生甘草百部方解本方為治浸淫瘡和一切瘡瘍之外敷藥膏浸淫瘡初生蔓延不止瘙癢難忍或流黃水浸淫成片所謂濕毒濕疹黃水瘡之類是也本方辛寒酸收有清熱解毒除濕殺蟲之效是為治療濕毒浸淫之妙劑也方中官粉即鉛粉味甘辛氣寒涼善治惡瘡癰腫瘻爛乾溼疥癬瘡中出水等症白蘞味苦辛微甘氣微寒散火毒主治癰腫疽瘡散結止痛銅緑氣味酸平有殺蟲之效能治惡瘡疳瘡五倍子酸收除濕血餘即頭髮苦溫主大風厲瘡濕瘡並能引藥力深入髮根故對頭上浸淫惡瘡有卓效也加大黃者因能清熱解毒乳香能生肌止痛雄黃能除濕殺蟲生甘草百部有解毒殺蟲收斂之功也濟生館特效藥編者按據郝樹侯太原史話載太原市東米市衛濟生館出售之濟生膏九龍膏拔毒膏如神丹四種外科成藥為太原市之特效藥濟生館系李光遠所創始原籍山東為走方醫生為人豪邁來太原後結識了傅青主幫助他開起濟生館來為書濟生館額井將出售成藥加以改進濟生膏專治跌打損傷及無名腫毒等症九龍膏專治七十二種疔毒拔毒膏專治癰疽發背瘰癧鼠瘡等症如神丹是外敷藥有去腐生肌功能濟生館四種外科成藥雖然井非傅青主所創但在改進上傅青主卻有很大幫助特將濟生館祕方加以介紹供外科臨床上參考濟生膏紫荊皮八錢獨活八錢白芷八錢赤芍八錢菖蒲八錢川大黃黃芩當歸桃仁黃連紅花黃柏蘇木肉桂防風千金子荊芥牛子羌活麻黃細辛半夏牙皂烏藥貝母花粉黃耆銀花連翹山甲柴胡苦參薑蠶白附子鱉甲全蠍草烏天麻大戟胡麻牛膝防己白芨白蘞海風藤血餘以上各三錢二分蜈蚣二條蛇退一條蝟皮三錢二分槐枝柳枝上藥用大磨油四斤入鍋內熬至滴水成珠藥枯過去渣將鍋用爛紙擦淨將油的數量稱準再將油入鍋內油熱將飛過黃丹用丹一兩用油二兩一手下丹一手用槐柳枝不住攪勻須要火大奪下火再下細藥乳香三錢二分沒藥三錢二分血竭二錢雄黃二錢上藥研面先下此四味再下後七味香藥麝香三錢沉香降香云香丁香藿香木香各一兩五錢上藥七味共研細面入瓶內將瓶口用黃蠟封上每一料用細藥一兩此七味入鍋內攪勻再下潮腦錢二方解本方藥味雖多而以祛風行瘀為主解毒宣通為輔故能治跌打損傷男婦老幼中風中濕中寒之肢體痹痛以及一切無名腫毒之症中風中寒中濕邪阻經絡者得諸經風藥則可宣之散之痹痛日久邪入血分者或跌打損傷瘀血留滯經絡者得諸血藥則能通之行之諸邪郁久不散或鬱熱入血而發癰瘍者得諸藥宣散之通行之寒折之則瘀血邪毒自無留止之地宿恙沉痼亦隨之而愈矣拔毒膏當歸赤芍黃柏生地川大黃花粉皂刺白芨全蠍白芷木通甘草白蘞共藥十三味各八錢另血餘不拘多少上藥用大磨香油四斤用文武火熬至滴水成珠去渣將鍋擦淨將油再入鍋內先下黃丹用丹一兩用油二兩槐柳條攪勻再下黃蠟二兩須用火大奪下火再下細藥乳香沒藥血竭兒茶白降丹共為細面各八錢方解本方為癰瘍癤腫之外貼膏藥有清熱解毒涼血消腫之功用於癰瘍癤腫初起赤腫焮痛七十二種瘡毒屬陽症者為宜瘡瘍癤腫多由經絡中毒熱蘊蓄而成方中大黃黃柏兒茶白蘞花粉均俱清熱解毒和除濕消腫之效當歸赤芍生地活血除熱以和營乳香沒藥血竭血餘活血行瘀以定痛全蠍白降解瘡毒白芷辛散宣散毒邪木通導下清熱利濕甘草清熱解毒調和諸藥皂刺散腫潰堅白芨生肌定痛凡瘡瘍陽症得此清熱和營解毒消腫之劑自無不宜陰症癰瘍或日久致虛瘡口黑紫坍陷者不宜採用此膏九龍膏巴豆五錢全蠍五錢甘草五錢當歸五錢赤芍五錢大黃五錢白芷五錢皂刺五錢白蘞五錢蜈蚣十條再下細藥乳香五錢沒藥五錢兒茶五錢血竭三錢本膏煉油制膏諸法與濟生膏拔毒膏相同方解此方亦為癰瘍外用膏藥與拔毒膏為一陰一陽拔毒膏涼解陽症熱毒九龍膏辛熱解陰症寒毒拔毒膏宜於癰瘍初起未潰之前九龍膏則宜於潰後腐肉不落瘡口久不收斂者以及癰疽發背瘰癧鼠瘡等症方中巴豆味辛性熱有大毒外用去腐生新拔毒蜈蚣味辛性溫有毒去惡血殺三蟲祛風解毒白芷辛溫宣解毒邪以上三味皆辛熱之品得大黃白蘞兒茶三味寒以制熱使成協調之妙歸芍和血乳沒血竭祛瘀全蠍祛風解毒本膏拔毒去腐和血生肌而無過寒過熱之害是為外科之良方也如神丹水銀一兩硃砂五錢雄黃五錢黑礬五錢白礬二兩火硝四兩用二礬一硝兌正分量不論斤稱用銅鍋鐵搓炒化先化成水再炒成干塊黃色就不用炒倒出銅鍋外用兌臼搗成細面炒成此藥定要過年用上藥先將水銀硃砂雄黃三味研成面再將炒下的二礬一硝用四兩在一塊研面裝在罐內將罐外抹上紙筋泥口上用熟石膏細末醋調封固用火焙乾底上再上泥再上木炭火升煉為妙方解本方為拔毒去腐生肌之劑治一切瘡瘍潰後或瘡口堅硬肉黯紫黑者方中水銀硃砂雄黃三味均為解毒要藥二礬去腐燥濕火硝清熱解毒諸藥合用俱有解毒去腐之功對於外瘍潰後腐肉未去者可用以去腐腐去自能生新矣本方藥味與金鑑外科紅升丹相同分量上稍有差異煉製法也有差異瘙癢驗方編者按本方為傅青主驗方之一流傳於西村一帶對各種瘙癢用本方煎洗確有卓效陰戶癢者熏洗亦效山西省中醫研究所白清佐老大夫用本方治滴蟲性陰道炎臨床證明效果亦良好花椒一兩蘄艾一兩防風一兩老蔥十根水煎洗方解風濕鬱於皮膚常發癢腫風疹之疾方中花椒蘄艾除風冷逐濕痹防風治三十六種風除經絡中濕大蔥宣通上下之陽氣發散表邪故毛竅閉塞風濕鬱結者得此宣散之湯洗之腠理宣通表邪自解風濕癢腫則愈婦女陰癢帶下多由濕鬱所致故用本方熏洗亦有卓效燙火傷驗方編者按本方為西村一帶流傳傅青主驗方之一白清佐老大夫臨床證明本方有止疼散熱解毒作用效果良好新石灰取油用清水在盆內攪數百下沉澱後水面浮出一層名石灰油放在碟中加上好香油隨加隨攪即成稠液塗敷傷處方解石灰能止金瘡血生肌長肉散血定痛加香油調成藥膏塗敷燙火傷未潰者可消腫定痛潰而無皮者能止血定痛生肌長肉香油調膏塗敷傷面可潤澤皮膚減少痛苦並能減少感染按本方初見於肘後方用治燙火傷集簡方用以治杖瘡腫痛
